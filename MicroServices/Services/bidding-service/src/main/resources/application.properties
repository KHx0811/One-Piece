spring.application.name=bidding-service
#Server configuration
server.port=8093

#Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/onepiece
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true


spring.security.user.name=user
spring.security.user.password=1234
server.servlet.session.cookie.same-site=strict

spring.servlet.multipart.max-file-size=16MB
spring.servlet.multipart.max-request-size=80MB


eureka.client.serviceUrl.defaultZone=http://localhost:8760/eureka/
eureka.instance.prefer-ip-address=true
