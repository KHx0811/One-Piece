spring.application.name=api-gateway

server.port=8089
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

eureka.client.serviceUrl.defaultZone=http://localhost:8760/eureka/

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/user-service/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=AuthenticationFilter
spring.cloud.gateway.server.webflux.routes[0].filters[1]=RewritePath=/api/v1/user-service(?<segment>/?.*), /api/v1/user-service/${segment}

